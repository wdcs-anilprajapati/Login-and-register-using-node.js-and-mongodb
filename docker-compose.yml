version: '3.8'

services:
  app:
    build: .
    ports:
      - "2000:2000"
    environment:
      - MONGO_URI=mongodb://db:27017/signup-login
    depends_on:
      - db

  db:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:

